services:
  relay:
    image: codex-proxy-relay
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      RELAY_STORAGE_DIR: /app/data/chunked-requests
      RELAY_SHARED_SECRET: relay-secret
    volumes:
      - ./src:/app/src:ro
      - ./package.json:/app/package.json:ro
      - ./package-lock.json:/app/package-lock.json:ro
      - ./node_modules:/app/node_modules:ro
    ports:
      - "8787:8787"

  client-lab:
    image: codex-proxy-client-lab
    depends_on:
      - relay
    working_dir: /workspace
    volumes:
      - .:/workspace
      - /home/liahua/.codex:/shared-codex:ro
      - ./mitmproxy:/app/mitmproxy:ro
      - ./docker/client-lab/entrypoint.sh:/app/entrypoint.sh:ro
      - ./docker/client-lab/run_codex_inspect.sh:/app/run_codex_inspect.sh:ro
    environment:
      CHUNK_RELAY_ENABLED: "true"
      CHUNK_RELAY_BASE_URL: http://relay:8787
      CHUNK_RELAY_SHARED_SECRET: relay-secret
      CHUNK_RELAY_CHUNK_SIZE_BYTES: 30000
      CHUNK_RELAY_MATCH_HOSTS: ab.chatgpt.com
      http_proxy: http://127.0.0.1:8080
      https_proxy: http://127.0.0.1:8080
      HTTP_PROXY: http://127.0.0.1:8080
      HTTPS_PROXY: http://127.0.0.1:8080
      ALL_PROXY: http://127.0.0.1:8080
